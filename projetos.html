<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Projetos disponíveis para tatuagem do Alessandro Moura Tattoo Studio." />
  <title>Projetos Disponíveis - Alessandro Moura Tattoo Studio</title>
  <link rel="icon" type="image/png" href="img/logoteste2.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
</head>

<body>
  <section class="page page--dark">
    <header class="site-header">
      <div class="header-left">
        <a class="logo-header" href="index.html" aria-label="Alessandro Moura Tattoo Studio">
          <img src="img/logoteste2.png" alt="Logo do estúdio Alessandro Moura">
        </a>

        <nav class="site-nav" id="site-nav" aria-label="Menu principal">
          <a href="index.html" class="nav-link" aria-current="page">Início</a>
          <a href="cicatrizadas.html" class="nav-link">Cicatrizadas</a>
          <a href="projetos.html" class="nav-link">Projetos</a>
          <a href="campeonatos.html" class="nav-link">Campeonatos</a>
          <a href="historia.html" class="nav-link">Minha história</a>
        </nav>

        <div class="header-tools">
          <a id="auth-login" class="auth-control" href="login.html" aria-label="Entrar na área administrativa"
            title="Entrar">
            <i data-lucide="user-round" aria-hidden="true"></i>
          </a>

          <button id="auth-logout" class="auth-control" type="button" aria-label="Sair da área administrativa"
            title="Sair" hidden>
            <i data-lucide="log-out" aria-hidden="true"></i>
          </button>

          <button class="menu-toggle" type="button" aria-label="Abrir menu" aria-haspopup="true"
            aria-controls="site-nav" aria-expanded="false">
            <span class="hamburger"></span>
          </button>
        </div>
      </div>
    </header>
    <main class="page__content" data-aos="fade-up">
      <h1>Projetos Disponíveis</h1>
      <p>
        Aqui estão alguns dos meus projetos disponíveis. Sinta-se à vontade para explorar e entrar em contato para mais
        informações!
      </p>
    </main>

    <section class="gallery-block" data-aos="fade-up">
      <h2 class="gallery-title">Preto e Cinza</h2>

      <section class="admin-gallery-panel" aria-labelledby="upload-title">
        <div class="admin-gallery-heading">
          <div>
            <h3 id="upload-title">Adicionar fotografia</h3>
            <p>A imagem será otimizada antes do envio.</p>
          </div>
        </div>

        <form id="photo-upload-form" class="photo-upload-form">
          <div class="upload-field">
            <label for="photo-file">Fotografia</label>
            <input id="photo-file" name="photo" type="file" accept="image/jpeg,image/png,image/webp" required>
          </div>

          <div class="upload-field">
            <label for="photo-title">Descrição</label>
            <input id="photo-title" name="title" type="text" minlength="3" maxlength="120"
              placeholder="Ex.: Tatuagem realista cicatrizada" required>
          </div>

          <p id="upload-message" class="upload-message" role="status" aria-live="polite"></p>

          <button id="upload-submit" class="upload-submit" type="submit">
            <i data-lucide="upload" aria-hidden="true"></i>
            <span>Enviar fotografia</span>
          </button>
        </form>
      </section>

      <div class="gallery grid--featured" id="featured-gallery" data-gallery-page="projetos">
      </div>

    </section>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lightbox__backdrop" data-close="true"></div>

      <div class="lightbox__panel" role="dialog" aria-modal="true" aria-label="Visualização de imagem">
        <button class="lightbox__close" type="button" aria-label="Fechar (Esc)" data-close="true">✕</button>
        <button class="lightbox__nav lightbox__prev" type="button" aria-label="Anterior (seta esquerda)">‹</button>

        <figure class="lightbox__figure">
          <img class="lightbox__img" alt="">
          <figcaption class="lightbox__caption"></figcaption>
        </figure>

        <button class="lightbox__nav lightbox__next" type="button" aria-label="Próxima (seta direita)">›</button>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@1.21.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="script.js"></script>
    <script type="module" src="auth-ui.js"></script>
    <script type="module" src="gallery-manager.js"></script>

    <script>
      lucide.createIcons();
    </script>

</body>

</html>
