<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Alessandro Moura Tattoo Studio. Tatuagens autorais com foco em acabamento, higiene e estilo." />
  <title>Alessandro Moura Tattoo Studio</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
</head>

<body>
<section class="hero hero--dark" id="home">
  <video class="hero__video" autoplay muted loop playsinline aria-hidden="true">
    <source src="video/video1.mp4" type="video/mp4" />
    Seu navegador não suporta o elemento de vídeo.
  </video>

  <header class="site-header">
    <div class="header-left">
      <a class="logo-header" href="index.html" aria-label="Alessandro Moura Tattoo Studio">
        <img src="img/logoteste2.png" alt="Logo do estúdio Alessandro Moura">
      </a>

      <nav class="site-nav" id="site-nav" aria-label="Menu principal">
        <a href="index.html" class="nav-link" aria-current="page">Início</a>
        <a href="cicatrizadas.html" class="nav-link">Cicatrizadas</a>
        <a href="projetos.html" class="nav-link">Projetos</a>
        <a href="campeonatos.html" class="nav-link">Campeonatos</a>
        <a href="historia.html" class="nav-link">Minha história</a>
      </nav>

      <div class="header-tools">
        <a
          id="auth-login"
          class="auth-control"
          href="login.html"
          aria-label="Entrar na área administrativa"
          title="Entrar"
        >
          <i data-lucide="user-round" aria-hidden="true"></i>
        </a>

        <button
          id="auth-logout"
          class="auth-control"
          type="button"
          aria-label="Sair da área administrativa"
          title="Sair"
          hidden
        >
          <i data-lucide="log-out" aria-hidden="true"></i>
        </button>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Abrir menu"
          aria-haspopup="true"
          aria-controls="site-nav"
          aria-expanded="false"
        >
          <span class="hamburger"></span>
        </button>
      </div>
    </div>
  </header>

  <div class="hero__content" data-aos="fade-up">
    <p class="hero__kicker">Alessandro Moura • Tattoo Studio</p>

    <h1 class="hero__title">
      Arte autoral<br />
      <span>na sua pele</span>
    </h1>

    <p class="hero__text">
      Tatuagens com foco em acabamento, higiene e estilo. Veja o portfólio e agende sua sessão.
    </p>

    <div class="hero__actions">
      <a class="btn btn--primary" href="#agenda">Agendar no WhatsApp</a>
    </div>

    <div class="hero__meta">
      <a class="meta-pill" href="https://www.google.com/maps/dir//Studio,+Av.+Ruy+Rodriguez,+4640+-+3+-+Jardim+Mercedes,+Campinas+-+SP,+13056-460/@-22.9698242,-47.1436305,17z/data=!4m8!4m7!1m0!1m5!1m1!1s0x94c8b7f810feee23:0xfefc17d8eb75216f!2m2!1d-47.1433149!2d-22.9674851?authuser=0&entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener noreferrer">📍 Campinas, SP</a>
    </div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="script.js"></script>

<script src="https://unpkg.com/lucide@1.21.0/dist/umd/lucide.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="script.js"></script>
<script type="module" src="auth-ui.js"></script>

<script>
  lucide.createIcons();
</script>

</body>
</html>
